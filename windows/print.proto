syntax = "proto3";
package print;
 
service PrinterBridge {
  rpc ExecutePrintJob (PrintRequest) returns (PrintResponse);
  
  // corresponding to get_printer_job_by_id()
  rpc GetJobStatus (StatusRequest) returns (StatusResponse);

  // corresponding to get_printer_jobs()
  rpc GetAllJobs (Empty) returns (JobListResponse);
}

// empty protobuf for GetAllJobs
message Empty {}
 
message PrintRequest {
  bytes file_content = 1;
  string user_id = 2;
  bool is_duplex = 3;
  bytes encrypted_password = 4;
}
 
message PrintResponse {
  bool success = 1;
  string message = 2;
  string job_id = 3;
}

message StatusRequest {
  string job_id = 1;
}

// PrintData dataclass
message StatusResponse {
  string job_id = 1;
  int32 total_pages = 2;
  string submit_time = 3;  // ISO 8601 format
  string state = 4;
}

message JobListResponse {
  repeated StatusResponse jobs = 1;
}