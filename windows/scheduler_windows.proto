syntax = "proto3";
package scheduler_windows;

service PrinterBridge {
  rpc ExecutePrintJob (PrintRequest) returns (PrintResponse);
  rpc GetJobStatus (StatusRequest) returns (StatusResponse);
  rpc GetAllJobs (Empty) returns (JobListResponse);
}

message Empty {}

message PrintRequest {
  bytes file_content = 1;
  string user_id = 2;
  bool is_duplex = 3;
}

message PrintResponse {
  bool success = 1;
  string message = 2;
  string job_id = 3;
}

message StatusRequest {
  string job_id = 1;
}

message StatusResponse {
  string job_id = 1;
  int32 total_pages = 2;
  string submit_time = 3;
  string state = 4;
}

message JobListResponse {
  repeated StatusResponse jobs = 1;
}
