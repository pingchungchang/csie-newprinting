global
    maxconn 1000

defaults
    log     global
    mode    tcp
    retries 3
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s

# Stats UI: http://<any-node-ip>:7000
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /

# Primary (read-write) — connects to whoever Patroni reports as leader
# Patroni returns HTTP 200 on /primary only for the current leader
listen primary
    bind *:5000
    option httpchk OPTIONS /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server node1 NODE1_IP:5432 maxconn 100 check port 8008
    server node2 NODE2_IP:5432 maxconn 100 check port 8008
    server node3 NODE3_IP:5432 maxconn 100 check port 8008

# Replicas (read-only) — connects to Patroni replicas
# Patroni returns HTTP 200 on /replica only for standbys
listen replicas
    bind *:5001
    balance roundrobin
    option httpchk OPTIONS /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server node1 NODE1_IP:5432 maxconn 100 check port 8008
    server node2 NODE2_IP:5432 maxconn 100 check port 8008
    server node3 NODE3_IP:5432 maxconn 100 check port 8008
