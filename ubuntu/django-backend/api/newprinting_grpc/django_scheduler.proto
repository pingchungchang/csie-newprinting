syntax = "proto3";

package printing;

service SchedulerService {
  // django send printing request to scheduler
  rpc SubmitPrintJob (SubmitJobRequest) returns (SubmitJobResponse);
}

message SubmitJobRequest {
  int32 uid = 1;              // ubuntu ID
  string username = 2;        // username
  int32 total_pages = 3;      // for accounting
  string file_path = 4;       // shared file path
}

message SubmitJobResponse {
  bool success = 1;
  string message = 2;
  int32 uid = 3;              // return same uid to confirm
}

service DjangoService {
  // scheduler request django to refund
  rpc RefundJob (RefundRequest) returns (RefundResponse);
}

message RefundRequest {
  int32 uid = 1;              // failed ubuntu ID
  string reason = 2;          // failed reason
}

message RefundResponse {
  bool success = 1;
  string message = 2;
}
